
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gorod - Smart Marketplace</title>
    <!-- Tailwind CSS is now handled via Vite -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-viewport-height: 100vh;
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
            --app-max-width: 100%;
        }
        @media (min-width: 768px) {
            :root {
                --app-max-width: 768px;
            }
        }
        @media (min-width: 1024px) {
            :root {
                --app-max-width: 1024px;
            }
        }
        @media (min-width: 1280px) {
            :root {
                --app-max-width: 1200px;
            }
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            position: relative;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            background-color: #F3F4F6;
        }
        body {
            font-family: 'Onest', 'Inter', sans-serif;
            color: #111827;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
            display: flex;
            justify-content: center;
        }
        #root {
            width: 100%;
            max-width: var(--app-max-width);
            min-height: 100%;
            background-color: #F8F9FB;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        /* Custom scrollbar for desktop */
        @media (min-width: 769px) {
            ::-webkit-scrollbar {
                width: 6px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: #E5E7EB;
                border-radius: 10px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #D1D5DB;
            }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
